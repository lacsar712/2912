<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能生产线监控系统</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 生产线监控特定样式 */
        :root {
            --status-running: #28a745;
            --status-stopped: #6c757d;
            --status-error: #dc3545;
            --status-maintenance: #ffc107;
            --status-idle: #17a2b8;
        }

        .status-running { color: var(--status-running); }
        .status-stopped { color: var(--status-stopped); }
        .status-error { color: var(--status-error); }
        .status-maintenance { color: var(--status-maintenance); }
        .status-idle { color: var(--status-idle); }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-badge.running { background: rgba(40,167,69,0.1); color: var(--status-running); }
        .status-badge.stopped { background: rgba(108,117,125,0.1); color: var(--status-stopped); }
        .status-badge.error { background: rgba(220,53,69,0.1); color: var(--status-error); }
        .status-badge.maintenance { background: rgba(255,193,7,0.1); color: #856404; }
        .status-badge.idle { background: rgba(23,162,184,0.1); color: var(--status-idle); }

        /* 实时数据卡片 */
        .realtime-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .sensor-value {
            font-size: 32px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .sensor-unit {
            font-size: 14px;
            opacity: 0.8;
        }

        /* 甘特图样式 */
        .gantt-container {
            overflow-x: auto;
        }

        .gantt-bar {
            height: 24px;
            border-radius: 4px;
            position: relative;
        }

        /* 告警列表 */
        .alert-item {
            padding: 12px;
            border-left: 4px solid;
            margin-bottom: 8px;
            background: var(--bg-light);
        }
        .alert-item.warning { border-color: var(--warning-color); }
        .alert-item.error { border-color: var(--danger-color); }
        .alert-item.critical { border-color: #721c24; }

        /* 设备卡片 */
        .equipment-card {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            transition: all 0.3s;
        }
        .equipment-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .equipment-card .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        /* 侧边栏分组菜单 */
        .nav-group {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-group-header {
            justify-content: space-between;
        }

        .nav-caret {
            font-size: 10px;
            transition: transform 0.3s;
            margin-left: auto;
        }

        .nav-caret.rotate {
            transform: rotate(180deg);
        }

        .nav-submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .nav-submenu.show {
            max-height: 500px;
        }

        .nav-subitem {
            padding-left: 56px;
            font-size: 13px;
        }

        /* 组织架构页面样式 */
        .org-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: var(--spacing-lg);
            height: calc(100vh - var(--header-height) - var(--spacing-lg) * 2);
        }

        .org-sidebar {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            overflow-y: auto;
            box-shadow: var(--shadow-sm);
        }

        .org-main {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        /* 树形结构 */
        .tree-node {
            user-select: none;
        }

        .tree-node-content {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.2s;
            gap: 8px;
        }

        .tree-node-content:hover {
            background: var(--bg-light);
        }

        .tree-node-content.selected {
            background: rgba(0, 123, 255, 0.1);
            color: var(--primary-color);
        }

        .tree-node-content.drag-over {
            background: rgba(0, 123, 255, 0.2);
            border: 2px dashed var(--primary-color);
        }

        .tree-toggle {
            width: 16px;
            text-align: center;
            font-size: 10px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .tree-children {
            margin-left: 20px;
            overflow: hidden;
        }

        .tree-children.collapsed {
            display: none;
        }

        .tree-node-label {
            flex: 1;
            font-size: 14px;
        }

        .tree-node-count {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-light);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .tree-node-actions {
            display: none;
            gap: 4px;
        }

        .tree-node-content:hover .tree-node-actions {
            display: flex;
        }

        /* 拖拽样式 */
        .tree-node-content[draggable="true"] {
            cursor: grab;
        }

        .tree-node-content[draggable="true"]:active {
            cursor: grabbing;
        }

        .dragging {
            opacity: 0.5;
        }

        /* 穿梭框 */
        .transfer-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: var(--spacing-md);
            align-items: stretch;
        }

        .transfer-panel {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            background: var(--bg-white);
        }

        .transfer-header {
            padding: var(--spacing-sm) var(--spacing-md);
            border-bottom: 1px solid var(--border-light);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .transfer-search {
            padding: var(--spacing-sm);
            border-bottom: 1px solid var(--border-light);
        }

        .transfer-search input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 13px;
        }

        .transfer-list {
            flex: 1;
            overflow-y: auto;
            max-height: 400px;
            padding: 4px;
        }

        .transfer-item {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .transfer-item:hover {
            background: var(--bg-light);
        }

        .transfer-item.selected {
            background: rgba(0, 123, 255, 0.1);
            color: var(--primary-color);
        }

        .transfer-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .transfer-actions {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: var(--spacing-sm);
        }

        .transfer-btn {
            width: 40px;
            height: 36px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-white);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .transfer-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .transfer-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 权限分组页面 */
        .permission-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: var(--spacing-lg);
            height: calc(100vh - var(--header-height) - var(--spacing-lg) * 2);
        }

        .group-list {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
        }

        .group-list-header {
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .group-list-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-sm);
        }

        .group-item {
            padding: var(--spacing-md);
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin-bottom: var(--spacing-xs);
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .group-item:hover {
            background: var(--bg-light);
        }

        .group-item.active {
            background: rgba(0, 123, 255, 0.1);
            color: var(--primary-color);
        }

        .group-detail {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .group-detail-header {
            padding: var(--spacing-md) var(--spacing-lg);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .group-detail-body {
            flex: 1;
            padding: var(--spacing-lg);
            overflow-y: auto;
        }

        .tab-nav {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            border-bottom: 1px solid var(--border-light);
        }

        .tab-item {
            padding: var(--spacing-sm) var(--spacing-md);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .tab-item:hover {
            color: var(--text-primary);
        }

        .tab-item.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            font-weight: 500;
        }

        /* 看板样式 */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }

        .dashboard-card {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .dashboard-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .view-toggle {
            display: flex;
            gap: var(--spacing-xs);
            background: var(--bg-light);
            padding: var(--spacing-xs);
            border-radius: var(--radius-sm);
        }

        .view-toggle-btn {
            padding: 6px 16px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .view-toggle-btn.active {
            background: var(--bg-white);
            box-shadow: var(--shadow-sm);
            color: var(--primary-color);
            font-weight: 500;
        }

        /* 统计树 */
        .stat-tree-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .stat-tree-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .stat-tree-name {
            font-weight: 500;
            flex: 1;
        }

        .stat-tree-count {
            font-weight: 600;
            color: var(--primary-color);
        }

        .stat-progress {
            height: 8px;
            background: var(--bg-light);
            border-radius: 4px;
            overflow: hidden;
        }

        .stat-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--info-color));
            transition: width 0.3s;
        }

        /* 员工状态标签 */
        .status-active {
            color: var(--success-color);
        }

        .status-inactive {
            color: var(--danger-color);
        }

        .employee-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--info-color));
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 12px;
        }

        .filter-bar {
            display: flex;
            gap: var(--spacing-md);
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-white);
            font-size: 13px;
            cursor: pointer;
        }

        /* 操作菜单 */
        .action-menu {
            position: relative;
        }

        .action-menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            font-size: 16px;
            color: var(--text-secondary);
        }

        .action-menu-btn:hover {
            background: var(--bg-light);
            color: var(--text-primary);
        }

        .action-dropdown {
            position: absolute;
            right: 0;
            top: 100%;
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            z-index: 100;
            min-width: 120px;
            padding: 4px;
        }

        .action-dropdown-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-dropdown-item:hover {
            background: var(--bg-light);
        }

        .action-dropdown-item.danger {
            color: var(--danger-color);
        }

        .empty-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl);
            color: var(--text-muted);
        }

        .empty-panel-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
            opacity: 0.5;
        }
    </style>
</head>
